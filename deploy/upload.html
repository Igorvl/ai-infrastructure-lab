<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiobook Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 560px;
            padding: 20px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 32px;
        }

        .drop-zone {
            border: 2px dashed #333;
            border-radius: 16px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
            position: relative;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: #a78bfa;
            background: rgba(167, 139, 250, 0.05);
        }

        .drop-zone.has-file {
            border-color: #34d399;
            background: rgba(52, 211, 153, 0.05);
        }

        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .drop-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .drop-text {
            font-size: 0.95rem;
            color: #888;
        }

        .drop-text strong {
            color: #a78bfa;
        }

        .file-info {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #34d399;
            font-weight: 500;
        }

        .settings {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .settings label {
            font-size: 0.85rem;
            color: #888;
            white-space: nowrap;
        }

        .settings select {
            flex: 1;
            background: #161620;
            border: 1px solid #2a2a3a;
            color: #e0e0e0;
            padding: 10px 14px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        .settings select:focus {
            border-color: #a78bfa;
        }

        .settings select optgroup {
            color: #888;
            font-style: normal;
        }

        .settings select option {
            color: #e0e0e0;
            background: #161620;
        }

        .btn-preview {
            background: #2a2a3a;
            border: 1px solid #3a3a4a;
            color: #a78bfa;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .btn-preview:hover {
            background: #3a3a4a;
            transform: scale(1.05);
        }

        .btn {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-download {
            background: linear-gradient(135deg, #059669, #34d399);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-download:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(5, 150, 105, 0.3);
        }

        .progress-section {
            margin-top: 24px;
            display: none;
        }

        .progress-section.visible {
            display: block;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .progress-status {
            color: #a78bfa;
            font-weight: 500;
        }

        .progress-percent {
            color: #888;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #1a1a2a;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #3b82f6, #34d399);
            border-radius: 4px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .progress-details {
            margin-top: 12px;
            font-size: 0.8rem;
            color: #666;
        }

        .result {
            margin-top: 24px;
            padding: 20px;
            background: rgba(52, 211, 153, 0.08);
            border: 1px solid rgba(52, 211, 153, 0.2);
            border-radius: 12px;
            display: none;
        }

        .result.visible {
            display: block;
        }

        .result h3 {
            color: #34d399;
            font-size: 1rem;
            margin-bottom: 12px;
        }

        .result-info {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 16px;
        }

        .result-info span {
            color: #e0e0e0;
        }

        .error {
            margin-top: 16px;
            padding: 14px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 10px;
            color: #f87171;
            font-size: 0.85rem;
            display: none;
        }

        .error.visible {
            display: block;
        }

        .jobs-section {
            margin-top: 32px;
            border-top: 1px solid #1a1a2a;
            padding-top: 20px;
        }

        .jobs-title {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 12px;
        }

        .job-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 0.8rem;
        }

        .job-name {
            color: #ccc;
        }

        .job-status {
            font-weight: 500;
        }

        .job-status.done {
            color: #34d399;
        }

        .job-status.processing {
            color: #60a5fa;
        }

        .job-status.failed {
            color: #f87171;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📚 Аудиокнига</h1>
        <p class="subtitle">Загрузи текст — получи MP3</p>

        <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" accept=".txt,.md,.text">
            <div class="drop-icon">📄</div>
            <div class="drop-text">Перетащи файл или <strong>выбери</strong></div>
            <div class="file-info" id="fileInfo"></div>
        </div>

        <div class="settings">
            <label>Голос:</label>
            <select id="voiceSelect">
                <option value="auto">🌍 Авто — загрузка...</option>
            </select>
            <button class="btn-preview" id="previewBtn" onclick="previewVoice()" title="Прослушать">▶</button>
        </div>

        <button class="btn btn-primary" id="startBtn" disabled onclick="startJob()">Создать аудиокнигу</button>
        <div class="error" id="errorMsg"></div>

        <div class="progress-section" id="progressSection">
            <div class="progress-header">
                <span class="progress-status" id="progressStatus">Подготовка...</span>
                <span class="progress-percent" id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-details" id="progressDetails"></div>
        </div>

        <div class="result" id="resultSection">
            <h3>✅ Готово!</h3>
            <div class="result-info" id="resultInfo"></div>
            <a class="btn btn-download" id="downloadBtn" href="#" target="_blank">⬇ Скачать MP3</a>
        </div>

        <div class="jobs-section" id="jobsSection" style="display:none">
            <div class="jobs-title">Предыдущие задачи</div>
            <div id="jobsList"></div>
        </div>
    </div>

    <script>
        const ROUTER_URL = window.location.protocol + '//' + window.location.hostname + ':' + window.location.port;
        let selectedFile = null, currentJobId = null, pollTimer = null;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const startBtn = document.getElementById('startBtn');

        ['dragenter', 'dragover'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('dragover'); }));
        ['dragleave', 'drop'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove('dragover'); }));
        dropZone.addEventListener('drop', e => { if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]); });
        fileInput.addEventListener('change', e => { if (e.target.files[0]) selectFile(e.target.files[0]); });

        function selectFile(file) {
            selectedFile = file;
            document.getElementById('fileInfo').textContent = `${file.name} (${(file.size / 1024).toFixed(1)} КБ)`;
            dropZone.classList.add('has-file');
            startBtn.disabled = false;
            hideError();
        }

        async function startJob() {
            if (!selectedFile) return;
            startBtn.disabled = true; startBtn.textContent = 'Загрузка...'; hideError();
            const fd = new FormData();
            fd.append('file', selectedFile);
            fd.append('voice', document.getElementById('voiceSelect').value);
            try {
                const resp = await fetch(`${ROUTER_URL}/v1/audio/book`, { method: 'POST', body: fd });
                if (!resp.ok) throw new Error((await resp.json()).detail || 'Upload failed');
                const data = await resp.json();
                currentJobId = data.job_id;
                document.getElementById('progressSection').classList.add('visible');
                document.getElementById('resultSection').classList.remove('visible');
                startBtn.textContent = 'Генерация...';
                pollProgress();
            } catch (e) {
                showError(e.message); startBtn.disabled = false; startBtn.textContent = 'Создать аудиокнигу';
            }
        }

        async function pollProgress() {
            if (!currentJobId) return;
            try {
                const data = await (await fetch(`${ROUTER_URL}/v1/audio/book/${currentJobId}`)).json();
                const fill = document.getElementById('progressFill');
                const percent = document.getElementById('progressPercent');
                const status = document.getElementById('progressStatus');
                fill.style.width = data.progress + '%';
                percent.textContent = data.progress + '%';
                if (data.status === 'processing') {
                    status.textContent = `Озвучка: чанк ${data.current_chunk} из ${data.total_chunks}`;
                    document.getElementById('progressDetails').textContent = `Ошибок: ${data.errors || 0}`;
                    pollTimer = setTimeout(pollProgress, 2000);
                } else if (data.status === 'done') {
                    status.textContent = 'Готово!'; fill.style.width = '100%'; percent.textContent = '100%';
                    document.getElementById('resultSection').classList.add('visible');
                    document.getElementById('resultInfo').innerHTML = `Размер: <span>${data.size_mb} МБ</span> · Чанков: <span>${data.chunks_ok}/${data.total_chunks}</span>`;
                    const dlBtn = document.getElementById('downloadBtn');
                    dlBtn.href = data.url; dlBtn.textContent = `⬇ Скачать MP3 (${data.size_mb} МБ)`;
                    startBtn.textContent = 'Создать ещё'; startBtn.disabled = false;
                    loadJobs();
                } else if (data.status === 'failed') {
                    showError('Ошибка: ' + (data.error || 'Unknown'));
                    startBtn.textContent = 'Попробовать снова'; startBtn.disabled = false;
                } else {
                    status.textContent = 'В очереди...'; pollTimer = setTimeout(pollProgress, 2000);
                }
            } catch (e) { pollTimer = setTimeout(pollProgress, 3000); }
        }

        async function loadJobs() {
            try {
                const data = await (await fetch(`${ROUTER_URL}/v1/audio/books`)).json();
                if (data.jobs && data.jobs.length > 0) {
                    document.getElementById('jobsSection').style.display = 'block';
                    document.getElementById('jobsList').innerHTML = data.jobs.map(j => `
                        <div class="job-item">
                            <span class="job-name">${j.filename || '?'}</span>
                            <span class="job-status ${j.status}">${j.status === 'done' ? `<a href="${j.url}" target="_blank" style="color:#34d399">Скачать</a>` :
                            j.status === 'processing' ? `${j.progress}%` : j.status
                        }</span>
                        </div>`).join('');
                }
            } catch (e) { }
        }

        function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.classList.add('visible'); }
        function hideError() { document.getElementById('errorMsg').classList.remove('visible'); }

        // ========== ГОЛОСА ==========
        async function loadVoices() {
            const select = document.getElementById('voiceSelect');
            try {
                const data = await (await fetch(`${ROUTER_URL}/v1/audio/voices`)).json();
                const voices = data.voices || {};
                let ruVoices = [], enVoices = [], autoVoice = null;
                for (const [id, info] of Object.entries(voices)) {
                    if (id === 'auto') { autoVoice = info; continue; }
                    const entry = { id, label: info.label || id, engine: info.engine || '' };
                    if (info.lang === 'ru') ruVoices.push(entry); else enVoices.push(entry);
                }
                let html = '';
                if (autoVoice) html += `<option value="auto" selected>🌍 Авто (определяет язык)</option>`;
                if (ruVoices.length > 0) {
                    html += `<optgroup label="🇷🇺 Русские (Edge TTS)">`;
                    ruVoices.forEach(v => html += `<option value="${v.id}">${v.label}</option>`);
                    html += `</optgroup>`;
                }
                if (enVoices.length > 0) {
                    html += `<optgroup label="🇺🇸🇬🇧 English (Kokoro)">`;
                    enVoices.forEach(v => html += `<option value="${v.id}">${v.label}</option>`);
                    html += `</optgroup>`;
                }
                select.innerHTML = html || '<option value="af_heart">af_heart</option>';
            } catch (e) {
                select.innerHTML = `
                    <option value="auto" selected>🌍 Авто</option>
                    <optgroup label="🇷🇺 Русские"><option value="ru-RU-DariyaNeural">Дарья (жен)</option><option value="ru-RU-SvetlanaNeural">Светлана (жен)</option><option value="ru-RU-DmitryNeural">Дмитрий (муж)</option></optgroup>
                    <optgroup label="🇺🇸 English"><option value="af_heart">Heart (жен)</option><option value="am_adam">Adam (муж)</option></optgroup>`;
            }
        }

        async function previewVoice() {
            const voice = document.getElementById('voiceSelect').value;
            const btn = document.getElementById('previewBtn');
            btn.textContent = '⏳'; btn.disabled = true;
            const isRu = voice.startsWith('ru-') || voice === 'auto';
            const text = isRu ? 'Привет! Это прослушивание выбранного голоса. Как звучит?' : 'This is a preview of the selected voice. How does it sound?';
            try {
                const fd = new FormData();
                fd.append('file', new Blob([text], { type: 'text/plain' }), 'preview.txt');
                fd.append('voice', voice);
                const data = await (await fetch(`${ROUTER_URL}/v1/audio/book`, { method: 'POST', body: fd })).json();
                const check = async () => {
                    const sd = await (await fetch(`${ROUTER_URL}/v1/audio/book/${data.job_id}`)).json();
                    if (sd.status === 'done') { new Audio(sd.url).play(); btn.textContent = '▶'; btn.disabled = false; }
                    else if (sd.status === 'failed') { btn.textContent = '❌'; setTimeout(() => { btn.textContent = '▶'; btn.disabled = false; }, 2000); }
                    else setTimeout(check, 1000);
                };
                setTimeout(check, 2000);
            } catch (e) { btn.textContent = '❌'; setTimeout(() => { btn.textContent = '▶'; btn.disabled = false; }, 2000); }
        }

        loadVoices();
        loadJobs();
    </script>
</body>

</html>
