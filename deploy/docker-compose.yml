services:
  llm-router:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.router
    container_name: ai-router
    restart: unless-stopped
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env          # ← весь .env целиком попадает в контейнер      
    environment:
      - PYTHONUNBUFFERED=1    
      - HF_HOME=/app/models
      - CONFIG_PATH=deploy/antigravity.json
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SALUTE_SPEECH_KEY=${SALUTE_SPEECH_KEY}
      - http_proxy=http://host.docker.internal:10808
      - https_proxy=http://host.docker.internal:10808
      - no_proxy=ai-qdrant,ai-postgres,localhost,127.0.0.1,ai-router,tts-kokoro,tts-chatterbox,tts-sovits,ai-audio-host,ai-minio,api.siliconflow.com,ngw.devices.sberbank.ru,smartspeech.sber.ru
      - MINIO_ACCESS_KEY=${MINIO_USER}
      - MINIO_SECRET_KEY=${MINIO_PASSWORD}

    volumes:
      - ../routing:/app/routing
      - ./antigravity.json:/app/deploy/antigravity.json
      - ./audio_out:/app/audio_out
    networks:
      - ai-net

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-webui
    restart: always 
    ports:
      - "3000:8080"
    volumes:
      - webui_data:/app/backend/data
    environment:
      - HF_HOME=/app/models
      - OPENAI_API_BASE_URL=http://ai-router:8000/v1
      - OPENAI_API_KEY=sk-mock-key
      - HTTP_PROXY=""
      - HTTPS_PROXY=""
      - ALL_PROXY=""
      - http_proxy=""
      - https_proxy=""
      - all_proxy=""
      - NO_PROXY=ai-router,localhost,127.0.0.1,host.docker.internal
    networks:
      - ai-net
    depends_on:
      - llm-router

  tts-fast:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: tts-kokoro
    restart: unless-stopped
    volumes:
      - ./audio_out:/app/output
    networks:
      - ai-net

  # Fish Speech removed — replaced by Silero TTS (integrated into router)

  # ========== GPT-SoVITS: Клонирование голоса ==========
  tts-sovits:
    image: breakstring/gpt-sovits:latest
    container_name: tts-sovits
    restart: unless-stopped
    ports:
      - "9880:9880"   # API для инференса
      - "9871:9871"   # WebUI для обучения/настройки
    environment:
      - HF_HOME=/app/models
      - is_half=false           # CPU mode (float32, не float16)
      - OMP_NUM_THREADS=14      # 14 ядер для PyTorch (оставляем 6 на остальное)
      - MKL_NUM_THREADS=14
    volumes:
      - ./sovits-data/output:/app/output          # Выходные файлы
      - ./sovits-data/voices:/app/voices          # Образцы голосов
      - ./sovits-data/models:/app/GPT_SoVITS/pretrained_models  # Модели
    deploy:
      resources:
        limits:
          cpus: '16'            # Лимит 16 ядер из 20
          memory: 12G
    networks:
      - ai-net

  # ========== Chatterbox: Premium English TTS ==========
  tts-chatterbox:
    build:
      context: ../chatterbox-tts-api
      dockerfile: docker/Dockerfile.cpu
    container_name: tts-chatterbox
    restart: unless-stopped
    environment:
      - HF_HOME=/app/models
      - DEVICE=cpu
      - PORT=4123
      - HOST=0.0.0.0
      - EXAGGERATION=0.5
      - CFG_WEIGHT=0.5
      - TEMPERATURE=0.8
      - MAX_CHUNK_LENGTH=280
      - MAX_TOTAL_LENGTH=3000
    volumes:
      - chatterbox-models:/cache
    deploy:
      resources:
        limits:
          cpus: '14'
          memory: 8G
    networks:
      - ai-net


  audio-server:
    image: nginx:alpine
    container_name: ai-audio-host
    restart: unless-stopped
    volumes:
      - ./audio_out:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8090:80"
    networks:
      - ai-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # Пробрасываем порт для Web UI и REST API изнутри наружу    
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai-net

  postgres:
    image: postgres:15-alpine
    container_name: ai-postgres
    restart: unless-stopped
    environment:
      - HF_HOME=/app/models
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_DB=project_dna
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - ai-net

  # ========== MinIO: S3 Object Storage for images ==========
  minio:
    image: minio/minio:latest
    container_name: ai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    #   server /data — to start MinIO, save files in /data
    #   --console-address ":9001" — web on 9001
    environment:
      - HF_HOME=/app/models
      - MINIO_ROOT_USER=${MINIO_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD:-minioadmin123}
      #   ${VAR:-default} — take from .env, or use default
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Web Console (http://172.25.9.33:9001)
    networks:
      - ai-net

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped          # ← добавь если нет
    extra_hosts:
      - "host.docker.internal:host-gateway"   # ← нужно для доступа к прокси на хосте
    environment:
      - N8N_SECURE_COOKIE=false
      - http_proxy=http://host.docker.internal:10808
      - https_proxy=http://host.docker.internal:10808
      # Внутренние Docker-сервисы — НЕ через прокси:
      - no_proxy=localhost,127.0.0.1,ai-router,ai-postgres,ai-minio,ai-qdrant,ai-webui,ai-audio-host,tts-chatterbox,tts-sovits,tts-kokoro
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n    # ← убедись что volume задан
    networks:
      - ai-net



  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    restart: unless-stopped
    command: serve --base-url http://172.25.9.33:9080 --cache-file /var/cache/ntfy/cache.db --upstream-base-url https://ntfy.sh
    ports:
      - "9080:80"
    volumes:
      - ntfy_cache:/var/cache/ntfy
    networks:
      - ai-net

networks:
  ai-net:
    driver: bridge

volumes:
  chatterbox-models:
  webui_data:
  qdrant_data:
  pg_data:
  minio_data: 
  n8n_data:
  ntfy_cache:
