# Nginx config for Warm Standby Mirror (NAS)
# Serves as entry point when Ubuntu primary is down

upstream llm_router_mirror {
    server ai-router-mirror:8000;
}

server {
    listen 80;
    server_name _;

    # Health check endpoint (used by monitoring script)
    location /health {
        proxy_pass http://llm_router_mirror/v1/dna/health;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Main proxy — all traffic to LLM router
    location / {
        proxy_pass http://llm_router_mirror;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE / Streaming support
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}

