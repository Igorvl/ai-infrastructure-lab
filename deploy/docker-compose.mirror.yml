# ============================================================
# Project DNA — Warm Standby Mirror Stack (XPenology NAS)
# ============================================================
# USAGE:
#   Activate:   docker compose -f docker-compose.mirror.yml up -d
#   Deactivate: docker compose -f docker-compose.mirror.yml down
#
# ARCHITECTURE: Warm Standby — start ONLY when Ubuntu primary is down.
# Data is read-only (restored from ABB backup). No writes to shared DBs.
# ============================================================

services:

  # ── LLM Router Mirror ──────────────────────────────────────
  llm-router-mirror:
    image: 172.25.9.33:5000/ai-router:latest
    container_name: ai-router-mirror
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.mirror        # копия .env с Ubuntu (без SALUTE_SPEECH_KEY и TTS)
    environment:
      - HF_HOME=/app/models
      - CONFIG_PATH=deploy/antigravity.json
      - PYTHONUNBUFFERED=1
      # На зеркале НЕТ proxy — прямой выход в интернет через NAS
      - no_proxy=ai-qdrant-mirror,ai-postgres-mirror,localhost,127.0.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres-mirror:
        condition: service_healthy
      qdrant-mirror:
        condition: service_started
    networks:
      - mirror-net

  # ── PostgreSQL Mirror ───────────────────────────────────────
  postgres-mirror:
    image: postgres:15-alpine
    container_name: ai-postgres-mirror
    restart: unless-stopped
    ports:
      - "5433:5432"          # Другой порт чтобы не конфликтовал если NAS и Ubuntu в одной сети
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - mirror_pg_data:/var/lib/postgresql/data
      - ./mirror-restore:/docker-entrypoint-initdb.d:ro   # SQL dump для инициализации
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mirror-net

  # ── Qdrant Mirror ───────────────────────────────────────────
  qdrant-mirror:
    image: qdrant/qdrant:latest
    container_name: ai-qdrant-mirror
    restart: unless-stopped
    ports:
      - "6334:6333"
    volumes:
      - mirror_qdrant_data:/qdrant/storage
    networks:
      - mirror-net

  # ── MinIO Mirror ────────────────────────────────────────────
  minio-mirror:
    image: minio/minio:latest
    container_name: ai-minio-mirror
    restart: unless-stopped
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - mirror_minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - mirror-net

  # ── Nginx Entry Point ───────────────────────────────────────
  nginx-mirror:
    image: nginx:alpine
    container_name: nginx-mirror
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx-mirror.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - llm-router-mirror
    networks:
      - mirror-net

volumes:
  mirror_pg_data:
    driver: local
  mirror_qdrant_data:
    driver: local
  mirror_minio_data:
    driver: local

networks:
  mirror-net:
    driver: bridge

