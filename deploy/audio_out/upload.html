<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiobook Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 560px;
            padding: 20px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 32px;
        }

        /* Drop Zone */
        .drop-zone {
            border: 2px dashed #333;
            border-radius: 16px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
            position: relative;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: #a78bfa;
            background: rgba(167, 139, 250, 0.05);
        }

        .drop-zone.has-file {
            border-color: #34d399;
            background: rgba(52, 211, 153, 0.05);
        }

        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .drop-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .drop-text {
            font-size: 0.95rem;
            color: #888;
        }

        .drop-text strong {
            color: #a78bfa;
        }

        .file-info {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #34d399;
            font-weight: 500;
        }

        /* Voice Select */
        .settings {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .settings label {
            font-size: 0.85rem;
            color: #888;
            white-space: nowrap;
        }

        .settings select {
            flex: 1;
            background: #161620;
            border: 1px solid #2a2a3a;
            color: #e0e0e0;
            padding: 10px 14px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        .settings select:focus {
            border-color: #a78bfa;
        }

        /* Button */
        .btn {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-download {
            background: linear-gradient(135deg, #059669, #34d399);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-download:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(5, 150, 105, 0.3);
        }

        /* Progress */
        .progress-section {
            margin-top: 24px;
            display: none;
        }

        .progress-section.visible {
            display: block;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .progress-status {
            color: #a78bfa;
            font-weight: 500;
        }

        .progress-percent {
            color: #888;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #1a1a2a;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #3b82f6, #34d399);
            border-radius: 4px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .progress-details {
            margin-top: 12px;
            font-size: 0.8rem;
            color: #666;
        }

        /* Result */
        .result {
            margin-top: 24px;
            padding: 20px;
            background: rgba(52, 211, 153, 0.08);
            border: 1px solid rgba(52, 211, 153, 0.2);
            border-radius: 12px;
            display: none;
        }

        .result.visible {
            display: block;
        }

        .result h3 {
            color: #34d399;
            font-size: 1rem;
            margin-bottom: 12px;
        }

        .result-info {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 16px;
        }

        .result-info span {
            color: #e0e0e0;
        }

        /* Error */
        .error {
            margin-top: 16px;
            padding: 14px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 10px;
            color: #f87171;
            font-size: 0.85rem;
            display: none;
        }

        .error.visible {
            display: block;
        }

        /* Jobs List */
        .jobs-section {
            margin-top: 32px;
            border-top: 1px solid #1a1a2a;
            padding-top: 20px;
        }

        .jobs-title {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 12px;
        }

        .job-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 0.8rem;
        }

        .job-name {
            color: #ccc;
        }

        .job-status {
            font-weight: 500;
        }

        .job-status.done {
            color: #34d399;
        }

        .job-status.processing {
            color: #60a5fa;
        }

        .job-status.failed {
            color: #f87171;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📚 Аудиокнига</h1>
        <p class="subtitle">Загрузи текст — получи MP3</p>

        <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" accept=".txt,.md,.text">
            <div class="drop-icon">📄</div>
            <div class="drop-text">Перетащи файл или <strong>выбери</strong></div>
            <div class="file-info" id="fileInfo"></div>
        </div>

        <div class="settings">
            <label>Голос:</label>
            <select id="voiceSelect">
                <option value="af_heart">af_heart — загрузка...</option>
            </select>
            <button class="btn-preview" id="previewBtn" onclick="previewVoice()" title="Прослушать">▶</button>
        </div>
        <style>
            .btn-preview {
                background: #2a2a3a;
                border: 1px solid #3a3a4a;
                color: #a78bfa;
                width: 40px;
                height: 40px;
                border-radius: 10px;
                cursor: pointer;
                font-size: 1rem;
                transition: all 0.2s;
            }

            .btn-preview:hover {
                background: #3a3a4a;
                transform: scale(1.05);
            }
        </style>

        <button class="btn btn-primary" id="startBtn" disabled onclick="startJob()">
            Создать аудиокнигу
        </button>

        <div class="error" id="errorMsg"></div>

        <div class="progress-section" id="progressSection">
            <div class="progress-header">
                <span class="progress-status" id="progressStatus">Подготовка...</span>
                <span class="progress-percent" id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-details" id="progressDetails"></div>
        </div>

        <div class="result" id="resultSection">
            <h3>✅ Готово!</h3>
            <div class="result-info" id="resultInfo"></div>
            <a class="btn btn-download" id="downloadBtn" href="#" target="_blank">
                ⬇ Скачать MP3
            </a>
        </div>

        <div class="jobs-section" id="jobsSection" style="display:none">
            <div class="jobs-title">Предыдущие задачи</div>
            <div id="jobsList"></div>
        </div>
    </div>

    <script>
        const ROUTER_URL = window.location.protocol + '//' + window.location.hostname + ':' + window.location.port;
        let selectedFile = null;
        let currentJobId = null;
        let pollTimer = null;

        // Drop zone
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const startBtn = document.getElementById('startBtn');

        ['dragenter', 'dragover'].forEach(e =>
            dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('dragover'); })
        );
        ['dragleave', 'drop'].forEach(e =>
            dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove('dragover'); })
        );

        dropZone.addEventListener('drop', e => {
            const file = e.dataTransfer.files[0];
            if (file) selectFile(file);
        });

        fileInput.addEventListener('change', e => {
            if (e.target.files[0]) selectFile(e.target.files[0]);
        });

        function selectFile(file) {
            selectedFile = file;
            const sizeKB = (file.size / 1024).toFixed(1);
            fileInfo.textContent = `${file.name} (${sizeKB} КБ)`;
            dropZone.classList.add('has-file');
            startBtn.disabled = false;
            hideError();
        }

        // Start job
        async function startJob() {
            if (!selectedFile) return;

            startBtn.disabled = true;
            startBtn.textContent = 'Загрузка...';
            hideError();

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('voice', document.getElementById('voiceSelect').value);

            try {
                const resp = await fetch(`${ROUTER_URL}/v1/audio/book`, {
                    method: 'POST',
                    body: formData
                });

                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail || 'Upload failed');
                }

                const data = await resp.json();
                currentJobId = data.job_id;

                // Show progress
                document.getElementById('progressSection').classList.add('visible');
                document.getElementById('resultSection').classList.remove('visible');

                startBtn.textContent = 'Генерация...';
                pollProgress();

            } catch (e) {
                showError(e.message);
                startBtn.disabled = false;
                startBtn.textContent = 'Создать аудиокнигу';
            }
        }

        // Poll progress
        async function pollProgress() {
            if (!currentJobId) return;

            try {
                const resp = await fetch(`${ROUTER_URL}/v1/audio/book/${currentJobId}`);
                const data = await resp.json();

                const fill = document.getElementById('progressFill');
                const percent = document.getElementById('progressPercent');
                const status = document.getElementById('progressStatus');
                const details = document.getElementById('progressDetails');

                fill.style.width = data.progress + '%';
                percent.textContent = data.progress + '%';

                if (data.status === 'processing') {
                    status.textContent = `Озвучка: чанк ${data.current_chunk} из ${data.total_chunks}`;
                    details.textContent = `Ошибок: ${data.errors || 0}`;
                    pollTimer = setTimeout(pollProgress, 2000);
                } else if (data.status === 'done') {
                    status.textContent = 'Готово!';
                    fill.style.width = '100%';
                    percent.textContent = '100%';

                    // Show result
                    const result = document.getElementById('resultSection');
                    result.classList.add('visible');

                    document.getElementById('resultInfo').innerHTML =
                        `Размер: <span>${data.size_mb} МБ</span> · ` +
                        `Чанков: <span>${data.chunks_ok}/${data.total_chunks}</span>`;

                    const dlBtn = document.getElementById('downloadBtn');
                    dlBtn.href = data.url;
                    dlBtn.textContent = `⬇ Скачать MP3 (${data.size_mb} МБ)`;

                    startBtn.textContent = 'Создать ещё';
                    startBtn.disabled = false;

                    loadJobs();
                } else if (data.status === 'failed') {
                    showError('Ошибка: ' + (data.error || 'Unknown'));
                    startBtn.textContent = 'Попробовать снова';
                    startBtn.disabled = false;
                } else {
                    status.textContent = 'В очереди...';
                    pollTimer = setTimeout(pollProgress, 2000);
                }
            } catch (e) {
                pollTimer = setTimeout(pollProgress, 3000);
            }
        }

        // Load previous jobs
        async function loadJobs() {
            try {
                const resp = await fetch(`${ROUTER_URL}/v1/audio/books`);
                const data = await resp.json();

                if (data.jobs && data.jobs.length > 0) {
                    const section = document.getElementById('jobsSection');
                    section.style.display = 'block';

                    const list = document.getElementById('jobsList');
                    list.innerHTML = data.jobs.map(j => `
                        <div class="job-item">
                            <span class="job-name">${j.filename || 'unknown'}</span>
                            <span class="job-status ${j.status}">${j.status === 'done' ? `<a href="${j.url}" target="_blank" style="color:#34d399">Скачать</a>` :
                            j.status === 'processing' ? `${j.progress}%` :
                                j.status
                        }</span>
                        </div>
                    `).join('');
                }
            } catch (e) { }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('visible');
        }

        function hideError() {
            document.getElementById('errorMsg').classList.remove('visible');
        }

        // Voice labels
        const VOICE_LABELS = {
            'af_heart': 'Heart (жен, мягкий)',
            'af_bella': 'Bella (жен, яркий)',
            'af_sky': 'Sky (жен, лёгкий)',
            'af_nicole': 'Nicole (жен)',
            'af_sarah': 'Sarah (жен)',
            'af_alloy': 'Alloy (жен)',
            'af_aoede': 'Aoede (жен)',
            'af_jessica': 'Jessica (жен)',
            'af_kore': 'Kore (жен)',
            'af_nova': 'Nova (жен)',
            'af_river': 'River (жен)',
            'af_shimmer': 'Shimmer (жен)',
            'am_adam': 'Adam (муж)',
            'am_michael': 'Michael (муж)',
            'am_echo': 'Echo (муж)',
            'am_eric': 'Eric (муж)',
            'am_fable': 'Fable (муж)',
            'am_liam': 'Liam (муж)',
            'am_onyx': 'Onyx (муж)',
            'bf_emma': 'Emma (жен, британ)',
            'bf_isabella': 'Isabella (жен, британ)',
            'bf_alice': 'Alice (жен, британ)',
            'bf_lily': 'Lily (жен, британ)',
            'bm_george': 'George (муж, британ)',
            'bm_lewis': 'Lewis (муж, британ)',
            'bm_daniel': 'Daniel (муж, британ)',
        };

        // Load voices from API
        async function loadVoices() {
            const select = document.getElementById('voiceSelect');
            try {
                const resp = await fetch(`${ROUTER_URL}/v1/audio/voices`);
                const data = await resp.json();
                const voices = data.voices || data;

                // Handle both array of strings and array of objects
                let voiceList = [];
                if (Array.isArray(voices)) {
                    voiceList = voices.map(v => typeof v === 'string' ? v : v.id || v.name);
                } else if (typeof voices === 'object') {
                    voiceList = Object.keys(voices);
                }

                if (voiceList.length > 0) {
                    select.innerHTML = voiceList.map(v => {
                        const label = VOICE_LABELS[v] || v;
                        return `<option value="${v}">${v} — ${label}</option>`;
                    }).join('');
                }
            } catch (e) {
                console.log('Could not load voices, using defaults');
                select.innerHTML = Object.entries(VOICE_LABELS).map(([k, v]) =>
                    `<option value="${k}">${k} — ${v}</option>`
                ).join('');
            }
        }

        // Preview voice
        async function previewVoice() {
            const voice = document.getElementById('voiceSelect').value;
            const btn = document.getElementById('previewBtn');
            btn.textContent = '⏳';
            btn.disabled = true;

            try {
                const resp = await fetch(`${ROUTER_URL}/v1/audio/book`, {
                    method: 'POST',
                    body: (() => {
                        const fd = new FormData();
                        const blob = new Blob(['This is a preview of the selected voice. How does it sound?'], { type: 'text/plain' });
                        fd.append('file', blob, 'preview.txt');
                        fd.append('voice', voice);
                        return fd;
                    })()
                });
                const data = await resp.json();
                // Poll until done
                const checkDone = async () => {
                    const sr = await fetch(`${ROUTER_URL}/v1/audio/book/${data.job_id}`);
                    const sd = await sr.json();
                    if (sd.status === 'done') {
                        const audio = new Audio(sd.url);
                        audio.play();
                        btn.textContent = '▶';
                        btn.disabled = false;
                    } else if (sd.status === 'failed') {
                        btn.textContent = '❌';
                        setTimeout(() => { btn.textContent = '▶'; btn.disabled = false; }, 2000);
                    } else {
                        setTimeout(checkDone, 1000);
                    }
                };
                setTimeout(checkDone, 2000);
            } catch (e) {
                btn.textContent = '❌';
                setTimeout(() => { btn.textContent = '▶'; btn.disabled = false; }, 2000);
            }
        }

        // Load on page init
        loadVoices();
        loadJobs();
    </script>
</body>

</html>
