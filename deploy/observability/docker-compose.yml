version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - monitor-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      # Настройки для Email-оповещений (раскомментируй и впиши свои данные):
      # - GF_SMTP_ENABLED=true
      # - GF_SMTP_HOST=smtp.your-domain.com:465
      # - GF_SMTP_USER=alerts@your-domain.com
      # - GF_SMTP_PASSWORD=your_password
      # - GF_SMTP_SKIP_VERIFY=true # Полезно, если сертификат сервера самоподписанный
      # - GF_SMTP_FROM_ADDRESS=alerts@your-domain.com
      # - GF_SMTP_FROM_NAME=Project DNA Alerts
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - monitor-net
    depends_on:
      - prometheus

  telegraf:
    image: telegraf:latest
    container_name: telegraf
    user: root
    entrypoint: /usr/bin/telegraf
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro
    ports:
      - "9273:9273"
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:

